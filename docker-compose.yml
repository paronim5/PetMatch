version: '3.8'

services:
  db:
    build:
      context: ./backend
      dockerfile: Dockerfile.db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=petmatch
    ports:
      - "5432:5432"
    networks:
      - petmatch-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    # For production, we don't mount the whole code directory.
    # Only mount static files for uploads persistence.
    volumes:
      - ./backend/static:/app/static
    environment:
      - POSTGRES_SERVER=db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=petmatch
      - POSTGRES_PORT=5432
      - SECRET_KEY=supersecretkey
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - petmatch-network

  frontend:
    build:
      context: ./frontendv2
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - petmatch-network

volumes:
  postgres_data:

networks:
  petmatch-network:
    driver: bridge
