version: '3.8'

services:
  db:
    build:
      context: ./backend
      dockerfile: Dockerfile.db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    env_file:
      - ./backend/.env
    networks:
      - petmatch-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    volumes:
      - petmatch_uploads:/app/static/uploads
    env_file:
      - ./backend/.env
    depends_on:
      db:
        condition: service_healthy
    networks:
      - petmatch-network

  stripe:
    image: stripe/stripe-cli:latest
    command: listen --forward-to backend:8000/api/v1/subscription/webhook --api-key ${STRIPE_SECRET_KEY}
    environment:
      - STRIPE_API_KEY=${STRIPE_SECRET_KEY}
    volumes:
      - ./backend/.env:/work/.env
    env_file:
      - ./backend/.env
    depends_on:
      - backend
    networks:
      - petmatch-network

  frontend:
    build:
      context: ./frontendv2
      dockerfile: Dockerfile
    # Expose internally only
    expose:
      - "80"
    depends_on:
      - backend
    networks:
      - petmatch-network

  nginx:
    image: nginx:1.25-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    command: "/bin/sh -c 'while :; do sleep 6h & wait $${!}; nginx -s reload; done & nginx -g \"daemon off;\"'"
    depends_on:
      - frontend
      - backend
    networks:
      - petmatch-network

  certbot:
    image: certbot/certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    networks:
      - petmatch-network

volumes:
  postgres_data:
  petmatch_uploads:

networks:
  petmatch-network:
    driver: bridge
