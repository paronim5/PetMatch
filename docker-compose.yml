version: '3.8'

services:
  db:
    build:
      context: ./backend
      dockerfile: Dockerfile.db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=petmatch
    # Tune PostgreSQL for low-memory instance (t3.micro = 1 GB RAM)
    command: >
      postgres
      -c shared_buffers=32MB
      -c work_mem=2MB
      -c maintenance_work_mem=16MB
      -c max_connections=20
      -c effective_cache_size=128MB
      -c checkpoint_completion_target=0.9
      -c wal_buffers=4MB
      -c synchronous_commit=off
    deploy:
      resources:
        limits:
          memory: 192M
        reservations:
          memory: 64M
    networks:
      - petmatch-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    volumes:
      - petmatch_uploads:/app/static/uploads
    env_file:
      - ./backend/.env
    environment:
      - POSTGRES_SERVER=db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=petmatch
      - POSTGRES_PORT=5432
      - SECRET_KEY=${SECRET_KEY:-change-this-in-production-use-env-file}
      - OMP_NUM_THREADS=1
      - OPENBLAS_NUM_THREADS=1
      - MKL_NUM_THREADS=1
    depends_on:
      db:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 384M
        reservations:
          memory: 128M
    networks:
      - petmatch-network

  stripe:
    image: stripe/stripe-cli:latest
    command: listen --forward-to backend:8000/api/v1/subscription/webhook --api-key ${STRIPE_SECRET_KEY}
    environment:
      - STRIPE_API_KEY=${STRIPE_SECRET_KEY}
    volumes:
      - ./backend/.env:/work/.env
    env_file:
      - ./backend/.env
    depends_on:
      - backend
    deploy:
      resources:
        limits:
          memory: 64M
    networks:
      - petmatch-network

  frontend:
    build:
      context: ./frontendv2
      dockerfile: Dockerfile
    # Expose internally only
    expose:
      - "80"
    depends_on:
      - backend
    deploy:
      resources:
        limits:
          memory: 48M
    networks:
      - petmatch-network

  nginx:
    image: nginx:1.25-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    depends_on:
      - frontend
      - backend
    deploy:
      resources:
        limits:
          memory: 32M
    networks:
      - petmatch-network

  certbot:
    image: certbot/certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    networks:
      - petmatch-network

volumes:
  postgres_data:
  petmatch_uploads:

networks:
  petmatch-network:
    driver: bridge
